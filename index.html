<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ant Colony: Real Ant Experience</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; color: white; }
        
        /* VIDEO DE FONDO FOTORREALISTA */
        #video-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; object-fit: cover; filter: brightness(0.4) contrast(1.2); }

        /* MENÚ DE INICIO ESTILO EMPIRE */
        #menu { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.6); transition: 1s; }
        .btn-start { padding: 20px 40px; font-size: 20px; background: #5d4037; color: gold; border: 2px solid gold; cursor: pointer; font-weight: bold; border-radius: 5px; }

        /* INTERFAZ DE ACCIÓN */
        #game-ui { display: none; }
        
        /* LA HORMIGA REALISTA */
        #ant-player { 
            position: absolute; 
            width: 60px; height: 60px; 
            /* Imagen de hormiga real top-down */
            background: url('https://i.ibb.co') no-repeat center;
            background-size: contain;
            z-index: 50; 
            transition: transform 0.15s ease-out;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));
        }

        /* HUD (INTERFAZ) */
        .hud { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; border-left: 5px solid gold; backdrop-filter: blur(5px); }
        #log { position: fixed; bottom: 20px; left: 20px; width: 300px; height: 100px; background: rgba(0,0,0,0.8); padding: 10px; font-size: 12px; color: #2ecc71; overflow-y: auto; }
        
        /* ZONAS DE INTERACCIÓN (TRANSPARENTES) */
        .zone { position: absolute; width: 200px; height: 200px; border-radius: 50%; border: 1px solid rgba(255,215,0,0.2); display: flex; align-items: center; justify-content: center; text-align: center; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Video de bosque real -->
    <iframe id="video-bg" src="https://www.youtube.com" frameborder="0"></iframe>

    <div id="menu">
        <h1 style="font-size: 50px; color: gold; text-shadow: 2px 2px 10px #000;">EMPIRE OF ANTS</h1>
        <p>Controla a la hormiga con WASD / Flechas</p>
        <button class="btn-start" onclick="start()">INICIAR COLONIA</button>
    </div>

    <div id="game-ui">
        <div class="hud">
            <h2 id="ui-rank">Casta: Nurse</h2>
            <p>Nivel: <b id="ui-lvl">1</b></p>
            <p>Comida: <b id="ui-food">0</b></p>
            <div style="width: 200px; height: 10px; background: #333; border-radius: 5px;">
                <div id="xp-bar" style="width: 0%; height: 100%; background: gold;"></div>
            </div>
        </div>

        <div id="log">> Usa WASD para caminar por el bosque.</div>

        <!-- El Mundo -->
        <div id="ant-player"></div>
        <div class="zone" style="top: 10%; left: 10%;">ENTRADA AL NIDO</div>
        <div class="zone" style="top: 20%; left: 70%;">ZONA DE CAZA</div>
        <div class="zone" style="top: 70%; left: 40%;">ALMACÉN DE GRANO</div>
    </div>

<script>
    let p = { x: window.innerWidth/2, y: window.innerHeight/2, angle: 0, lvl: 1, xp: 0, food: 0 };
    const ant = document.getElementById('ant-player');
    let keys = {};

    function start() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        updateAnt();
        gameLoop();
        // Cargar partida si existe
        if(localStorage.getItem('antSave')) {
            p = JSON.parse(localStorage.getItem('antSave'));
        }
    }

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    function gameLoop() {
        let moving = false;
        const speed = 4;

        if (keys['w'] || keys['arrowup']) { p.y -= speed; p.angle = 0; moving = true; }
        if (keys['s'] || keys['arrowdown']) { p.y += speed; p.angle = 180; moving = true; }
        if (keys['a'] || keys['arrowleft']) { p.x -= speed; p.angle = -90; moving = true; }
        if (keys['d'] || keys['arrowright']) { p.x += speed; p.angle = 90; moving = true; }

        // Diagonales
        if (keys['w'] && keys['d']) p.angle = 45;
        if (keys['w'] && keys['a']) p.angle = -45;
        if (keys['s'] && keys['d']) p.angle = 135;
        if (keys['s'] && keys['a']) p.angle = -135;

        if(moving) {
            checkZones();
            updateAnt();
            p.xp += 0.1; // Gana XP por caminar
            if(p.xp >= 100) levelUp();
        }
        requestAnimationFrame(gameLoop);
    }

    function updateAnt() {
        ant.style.left = p.x + 'px';
        ant.style.top = p.y + 'px';
        ant.style.transform = `rotate(${p.angle}deg)`;
        
        document.getElementById('ui-lvl').innerText = p.lvl;
        document.getElementById('ui-food').innerText = Math.floor(p.food);
        document.getElementById('xp-bar').style.width = (p.xp % 100) + '%';
    }

    function checkZones() {
        // Simulación simple de recolección al estar en zonas
        if(p.x > window.innerWidth*0.6 && p.y < window.innerHeight*0.3) {
            p.food += 0.05;
            if(Math.random() < 0.01) addLog("Has encontrado restos de un insecto.");
        }
    }

    function levelUp() {
        p.lvl++;
        p.xp = 0;
        addLog(`🎊 ¡Nivel ${p.lvl} alcanzado! Tu colonia es más fuerte.`, "gold");
        if(p.lvl >= 400) document.getElementById('ui-rank').innerText = "Casta: REINA MADRE";
        else if(p.lvl >= 50) document.getElementById('ui-rank').innerText = "Casta: Soldado";
        
        // Guardar progreso
        localStorage.setItem('antSave', JSON.stringify(p));
    }

    function addLog(m, col="#2ecc71") {
        const l = document.getElementById('log');
        l.innerHTML = `<span style="color:${col}">> ${m}</span><br>` + l.innerHTML;
        l.scrollTop = 0;
    }
</script>
</body>
</html>
