<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire of the Ants JS - Edición Local</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #ui-top { width: 100%; padding: 15px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; border-bottom: 2px solid #4a3728; z-index: 10; }
        .stat { font-weight: bold; color: #ffcc00; }
        canvas { background: #4a3728; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        #controls { position: fixed; bottom: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #795548; border: none; color: white; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #a1887f; }
        .log { position: fixed; right: 20px; top: 80px; width: 200px; font-size: 0.8em; color: #aaa; }
    </style>
</head>
<body>

<div id="ui-top">
    <div>Nivel: <span id="lvl" class="stat">1</span></div>
    <div>Comida: <span id="food" class="stat">0</span></div>
    <div>Hormigas: <span id="ants" class="stat">0</span></div>
    <div>Objetivo: <span id="goal" class="stat">100</span> comida</div>
</div>

<div class="log" id="gameLog">Iniciando colonia...</div>

<canvas id="gameCanvas"></canvas>

<div id="controls">
    <button onclick="spawnAnt()">Criar Hormiga (10 Comida)</button>
    <button onclick="resetGame()" style="background: #d32f2f;">Resetear Datos</button>
</div>

<script>
/**
 * EMPIRE OF THE ANTS JS - Lógica de Juego
 * Basado en la persistencia local y progresión de niveles.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const logEl = document.getElementById('gameLog');

// Ajuste de tamaño
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- ESTADO INICIAL ---
let gameState = {
    nivel: 1,
    comida: 20,
    hormigas: [],
    nido: { x: canvas.width/2, y: canvas.height/2 },
    lastSave: Date.now()
};

// --- CLASE HORMIGA (IA Simple) ---
class Ant {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.targetX = Math.random() * canvas.width;
        this.targetY = Math.random() * canvas.height;
        this.speed = 1.5 + (gameState.nivel * 0.2);
        this.hasFood = false;
    }

    update() {
        let dx = this.targetX - this.x;
        let dy = this.targetY - this.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < 5) {
            if(this.hasFood) {
                // Entregar comida en el nido
                this.hasFood = false;
                gameState.comida += 5;
                this.targetX = Math.random() * canvas.width;
                this.targetY = Math.random() * canvas.height;
                checkLevelUp();
            } else {
                // "Recolectar" y volver al nido
                this.hasFood = true;
                this.targetX = gameState.nido.x;
                this.targetY = gameState.nido.y;
            }
        } else {
            this.x += (dx/dist) * this.speed;
            this.y += (dy/dist) * this.speed;
        }
    }

    draw() {
        ctx.fillStyle = this.hasFood ? "#4CAF50" : "#000";
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
        ctx.fill();
    }
}

// --- SISTEMA DE GUARDADO (Local Storage) ---
function saveGame() {
    const data = {
        nivel: gameState.nivel,
        comida: gameState.comida,
        numHormigas: gameState.hormigas.length
    };
    localStorage.setItem('empireAntsSave', JSON.stringify(data));
    addLog("Progreso autoguardado...");
}

function loadGame() {
    const saved = localStorage.getItem('empireAntsSave');
    if(saved) {
        const data = JSON.parse(saved);
        gameState.nivel = data.nivel;
        gameState.comida = data.comida;
        for(let i=0; i < data.numHormigas; i++) {
            gameState.hormigas.push(new Ant(gameState.nido.x, gameState.nido.y));
        }
        addLog("Colonia cargada del nivel " + data.nivel);
    }
}

function resetGame() {
    if(confirm("¿Seguro que quieres borrar tu imperio?")) {
        localStorage.removeItem('empireAntsSave');
        location.reload();
    }
}

// --- MECÁNICAS ---
function spawnAnt() {
    if(gameState.comida >= 10) {
        gameState.comida -= 10;
        gameState.hormigas.push(new Ant(gameState.nido.x, gameState.nido.y));
        addLog("Nueva hormiga nacida");
    }
}

function checkLevelUp() {
    let goal = gameState.nivel * 150;
    if(gameState.comida >= goal) {
        gameState.nivel++;
        addLog("¡NIVEL " + gameState.nivel + " ALCANZADO!");
        saveGame();
    }
}

function addLog(msg) {
    logEl.innerText = msg;
}

// --- BUCLE PRINCIPAL ---
function gameLoop() {
    // Limpieza
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Dibujar Nido
    ctx.fillStyle = "#2e1a0d";
    ctx.beginPath();
    ctx.arc(gameState.nido.x, gameState.nido.y, 30, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "#ffcc00";
    ctx.stroke();

    // Actualizar Hormigas
    gameState.hormigas.forEach(ant => {
        ant.update();
        ant.draw();
    });

    // Actualizar UI
    document.getElementById('lvl').innerText = gameState.nivel;
    document.getElementById('food').innerText = Math.floor(gameState.comida);
    document.getElementById('ants').innerText = gameState.hormigas.length;
    document.getElementById('goal').innerText = gameState.nivel * 150;

    requestAnimationFrame(gameLoop);
}

// --- INICIO ---
window.onload = () => {
    loadGame();
    // Autoguardado cada 10 segundos
    setInterval(saveGame, 10000);
    gameLoop();
};
</script>
</body>
</html>
